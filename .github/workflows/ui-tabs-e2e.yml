name: UI Tabs E2E

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ui-tabs-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-tabs-smoke:
    name: Playwright UI Tabs Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pepi package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install Playwright dependencies
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Start Pepi Web UI
        run: |
          pepi --web-ui > pepi-ui.log 2>&1 &

      - name: Wait for Web UI
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Web UI did not become ready in time"
          exit 1

      - name: Run UI tab smoke tests
        run: npm run test:e2e:ui-tabs

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-ui-tabs-artifacts
          path: |
            playwright-report
            test-results
            pepi-ui.log
          if-no-files-found: ignore
